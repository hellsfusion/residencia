name: Deploy to InfinityFree

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy changed files
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          if [ -z "$FILES" ]; then
            echo "No hay archivos modificados."
            exit 0
          fi

          LFTP_CMDS=$(mktemp)
          echo "set ssl:verify-certificate no" > "$LFTP_CMDS"
          echo "open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_SERVER\"" >> "$LFTP_CMDS"

          EXCLUDES=".git/|.gitignore|.agents/|skills-lock.json|node_modules/|vendor/|plugins/|dist/|.env"

          while IFS= read -r f; do
            if echo "$f" | grep -qE "^($EXCLUDES)"; then
              continue
            fi
            if [ -f "$f" ]; then
              dir=$(dirname "$f")
              echo "mkdir -p -f \"/htdocs/$dir\"" >> "$LFTP_CMDS"
              echo "put -O \"/htdocs/$dir\" \"$f\"" >> "$LFTP_CMDS"
              echo "  -> $f"
            fi
          done <<< "$FILES"

          echo "quit" >> "$LFTP_CMDS"
          lftp -f "$LFTP_CMDS"
          rm -f "$LFTP_CMDS"
